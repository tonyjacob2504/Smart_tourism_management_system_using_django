{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- Package Start -->
<div class="container-xxl py-5">
    <div class="container">
        <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
            <h6 class="section-title bg-white text-center text-primary px-3">Users</h6>
            <h1 class="mb-5">Chat With Users</h1>
        </div>
       


        <div class="container">
            <div class="row">
                {% for i in result %}  <!-- Loop through the user list -->
                <div class="col-md-4 col-sm-6 mb-4">  <!-- Adjust column width as needed -->
                    <div class="profile-container text-center p-3 shadow rounded bg-light">
                        <img src="{{ i.profile.url }}" alt="Profile Image" class="rounded-circle shadow" width="150" height="150">
                        <h2 class="mt-3 font-weight-bold">{{ i.fullname }}</h2>
                        
                        <!-- Chat Button -->
                        <div class="mt-3">
                            <a href="{% url 'user_chat' i.id %}" class="btn btn-warning btn-sm shadow">Chat</a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        


            
    </div>
</div>
<!-- Package End -->

{% endblock %}
