{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-xxl py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
                    <h6 class="section-title bg-white text-center text-primary px-3">Partner Login</h6>
                    <h1 class="mb-5">Hotel Management Login</h1>
                </div>
                {% if messages %}
                <div class="mb-4">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} text-center rounded-pill">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
                <div class="card shadow border-0 rounded-4 overflow-hidden wow fadeInUp" data-wow-delay="0.3s">
                    <div class="card-body p-4 p-md-5">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" name="email" placeholder="name@example.com"
                                    required>
                                <label>Official Hotel Email</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" name="pass" placeholder="Password" required>
                                <label>Management Password</label>
                            </div>
                            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" type="submit">
                                <i class="fa fa-sign-in-alt me-2"></i>Login to Dashboard
                            </button>
                        </form>
                        <div class="text-center mt-4">
                            <p class="small text-muted mb-0">Not a partner yet?</p>
                            <a href="{% url 'hotel_register' %}" class="small fw-bold">Register Your Hotel</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
