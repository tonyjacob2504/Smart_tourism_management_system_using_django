{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container-xxl py-5">
    <div class="container">
        {% if messages %}
        <div class="container mt-3 ">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} text-center" style="background-color:rgb(236, 10, 10); color: #fcf9f9; ">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
            <h6 class="section-title bg-white text-center text-primary px-3 ">Feedback</h6>
            <h1 class="mb-5">Add Feedback</h1>
        </div>
        <div class="row g-4">
            
            
            <div class="col-lg-12 col-md-12 wow fadeInUp" data-wow-delay="0.5s">
                <form method="Post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        
                        
                        <div class="col-12">
                            <div class="form-floating">
                                <textarea class="form-control" placeholder="Leave a message here" id="message" name="feedback" style="height: 100px" required></textarea>
                                <label for="message">Feedback</label>
                            </div>
                        </div>
                        
                        <div class="col-12">
                            <button class="btn btn-primary w-100 py-3" type="submit">Submit</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
